global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert.rules"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # Prometheus scrapes itself (useful for debugging)
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Your log aggregator service - exposes security metrics
  - job_name: "log_aggregator"
    static_configs:
      - targets: ["log-aggregator:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s  # Faster for security events

  # The simulated network nodes (if they expose metrics)
  - job_name: "network_nodes"
    static_configs:
      - targets:
          - "core-router:9100"
          - "edge-sw-01:9100"
          - "edge-sw-02:9100"
