global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "source_ip"]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h
  receiver: "ai-agent-webhook"

receivers:
  - name: "ai-agent-webhook"
    webhook_configs:
      - url: "http://ai-agent:5000/alert"
        send_resolved: true
